<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitriol · 双模型并排 3D 对比</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }
        .glass {
            background: rgba(15, 18, 30, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
        }
        .view-btn {
            padding: 6px 12px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            font-size: 11px;
            color: #60a5fa;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .view-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }
        .view-btn.primary {
            background: rgba(132, 204, 22, 0.25);
            border-color: rgba(132, 204, 22, 0.4);
            color: #a3e635;
        }
        .view-btn.primary:hover {
            background: rgba(132, 204, 22, 0.4);
        }
        .viewer-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #050508;
        }
        .split-handle {
            width: 4px;
            background: linear-gradient(90deg, transparent, rgba(96,165,250,0.4), transparent);
            cursor: col-resize;
            z-index: 50;
            transition: background 0.2s;
        }
        .split-handle:hover {
            background: linear-gradient(90deg, transparent, rgba(96,165,250,0.8), transparent);
        }
        .panel-header {
            height: 48px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 18, 30, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        select.model-select {
            background: rgba(0,0,0,0.4);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            font-family: monospace;
            outline: none;
            cursor: pointer;
            max-width: 280px;
        }
        .model-badge {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(96,165,250,0.2);
            color: #60a5fa;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="fixed top-0 left-0 right-0 z-30 glass" style="border-radius: 0; border-left: none; border-right: none; border-top: none;">
    <div class="flex items-center justify-between px-4 py-2">
        <div class="flex items-center gap-3">
            <h1 class="text-sm font-bold text-white">⚖️ 双模型并排对比</h1>
            <span class="model-badge">3D Side-by-Side</span>
        </div>
        <div class="flex gap-2">
            <button onclick="swapModels()" class="view-btn" title="交换左右模型">↔️ 交换</button>
            <button onclick="syncCameras()" class="view-btn" title="同步镜头">🔗 同步视角</button>
            <a href="arch-compare.html" class="view-btn">📊 特性对比</a>
            <a href="viewer.html" class="view-btn">🎨 单视图</a>
            <a href="index.html" class="view-btn">🏠 主页</a>
        </div>
    </div>
</div>

<!-- Split View -->
<div class="flex w-full h-full pt-12" id="splitContainer">
    
    <!-- Left Panel -->
    <div class="flex flex-col flex-1 relative">
        <div class="panel-header">
            <div class="flex items-center gap-2">
                <span class="text-xs text-blue-400 font-bold">🔵 LEFT</span>
                <select id="leftSelect" class="model-select" onchange="loadModel('left', this.value)">
                    <optgroup label="🔥 Flagship">
                        <option value="Qwen/Qwen3.6-27B">Qwen3.6-27B (Hybrid+VL)</option>
                        <option value="deepseek-ai/DeepSeek-V4-Pro" selected>DeepSeek-V4-Pro (MLA+MoE)</option>
                        <option value="XiaomiMiMo/MiMo-V2.5-Pro">MiMo-V2.5-Pro</option>
                    </optgroup>
                    <optgroup label="🦙 LLaMA">
                        <option value="meta-llama/Llama-3.1-8B">LLaMA 3.1 8B</option>
                    </optgroup>
                    <optgroup label="🌬️ Mistral">
                        <option value="mistralai/Mistral-7B-v0.3">Mistral 7B</option>
                        <option value="mistralai/Mixtral-8x7B-v0.1">Mixtral 8x7B</option>
                    </optgroup>
                    <optgroup label="🌸 Qwen">
                        <option value="Qwen/Qwen2.5-7B">Qwen 2.5 7B</option>
                    </optgroup>
                    <optgroup label="🔬 Others">
                        <option value="microsoft/Phi-3-mini-4k-instruct">Phi-3 Mini</option>
                        <option value="google/gemma-2-9b">Gemma 2 9B</option>
                        <option value="THUDM/glm-4-9b">GLM-4 9B</option>
                    </optgroup>
                </select>
            </div>
            <div class="text-xs text-gray-500" id="leftStatus">Loading...</div>
        </div>
        <iframe id="leftFrame" class="viewer-frame" src="viewer.html#?hf=deepseek-ai/DeepSeek-V4-Pro&compact=1"></iframe>
    </div>
    
    <!-- Divider -->
    <div class="split-handle" id="splitHandle"></div>
    
    <!-- Right Panel -->
    <div class="flex flex-col flex-1 relative">
        <div class="panel-header">
            <div class="flex items-center gap-2">
                <span class="text-xs text-amber-400 font-bold">🟡 RIGHT</span>
                <select id="rightSelect" class="model-select" onchange="loadModel('right', this.value)">
                    <optgroup label="🔥 Flagship">
                        <option value="Qwen/Qwen3.6-27B" selected>Qwen3.6-27B (Hybrid+VL)</option>
                        <option value="deepseek-ai/DeepSeek-V4-Pro">DeepSeek-V4-Pro (MLA+MoE)</option>
                        <option value="XiaomiMiMo/MiMo-V2.5-Pro">MiMo-V2.5-Pro</option>
                    </optgroup>
                    <optgroup label="🦙 LLaMA">
                        <option value="meta-llama/Llama-3.1-8B">LLaMA 3.1 8B</option>
                    </optgroup>
                    <optgroup label="🌬️ Mistral">
                        <option value="mistralai/Mistral-7B-v0.3">Mistral 7B</option>
                        <option value="mistralai/Mixtral-8x7B-v0.1">Mixtral 8x7B</option>
                    </optgroup>
                    <optgroup label="🌸 Qwen">
                        <option value="Qwen/Qwen2.5-7B">Qwen 2.5 7B</option>
                    </optgroup>
                    <optgroup label="🔬 Others">
                        <option value="microsoft/Phi-3-mini-4k-instruct">Phi-3 Mini</option>
                        <option value="google/gemma-2-9b">Gemma 2 9B</option>
                        <option value="THUDM/glm-4-9b">GLM-4 9B</option>
                    </optgroup>
                </select>
            </div>
            <div class="text-xs text-gray-500" id="rightStatus">Loading...</div>
        </div>
        <iframe id="rightFrame" class="viewer-frame" src="viewer.html#?hf=Qwen/Qwen3.6-27B&compact=1"></iframe>
    </div>
    
</div>

<!-- Bottom Info Bar -->
<div class="fixed bottom-4 left-1/2 -translate-x-1/2 glass z-20 px-4 py-2 text-xs text-gray-400">
    💡 拖动中间分隔线调整宽度 · 下拉菜单切换模型 · 点击🔗同步镜头视角
</div>

<script>
// Load model in specified panel
function loadModel(side, hfRepo) {
    const frame = document.getElementById(side + 'Frame');
    const status = document.getElementById(side + 'Status');
    if (!frame || !hfRepo) return;
    
    // Update iframe with new model (no full page reload of parent)
    frame.src = `viewer.html#?hf=${encodeURIComponent(hfRepo)}&compact=1`;
    status.textContent = 'Loading...';
    status.style.color = '#fbbf24';
    
    // Listen for frame load
    frame.onload = () => {
        status.textContent = hfRepo.split('/').pop();
        status.style.color = '#4ade80';
    };
}

// Swap left and right
function swapModels() {
    const leftSelect = document.getElementById('leftSelect');
    const rightSelect = document.getElementById('rightSelect');
    const leftVal = leftSelect.value;
    const rightVal = rightSelect.value;
    
    leftSelect.value = rightVal;
    rightSelect.value = leftVal;
    
    loadModel('left', rightVal);
    loadModel('right', leftVal);
}

// Sync camera positions between iframes (best-effort)
function syncCameras() {
    const left = document.getElementById('leftFrame').contentWindow;
    const right = document.getElementById('rightFrame').contentWindow;
    
    try {
        // Try to read camera from left and apply to right
        if (left && left.camera && right && right.camera && right.controls) {
            const cam = left.camera;
            right.camera.position.copy(cam.position);
            right.camera.quaternion.copy(cam.quaternion);
            right.controls.target.copy(left.controls.target);
            right.controls.update();
            
            // Flash feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✅ 已同步';
            btn.style.background = 'rgba(34,197,94,0.3)';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 1500);
        } else {
            console.warn('Cameras not yet available in iframes');
        }
    } catch (e) {
        console.error('Camera sync failed:', e);
        alert('同步失败：iframe 可能尚未加载完成');
    }
}

// Resize split handle
(function setupSplitHandle() {
    const handle = document.getElementById('splitHandle');
    const container = document.getElementById('splitContainer');
    const leftPanel = container.firstElementChild;
    const rightPanel = container.lastElementChild;
    let isDragging = false;
    
    handle.addEventListener('mousedown', (e) => {
        isDragging = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        // Disable iframe pointer events during drag so mouseup always fires on parent
        document.getElementById('leftFrame').style.pointerEvents = 'none';
        document.getElementById('rightFrame').style.pointerEvents = 'none';
        e.preventDefault();
    });
    
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const total = container.offsetWidth;
        const leftWidth = e.clientX;
        const leftPercent = (leftWidth / total) * 100;
        if (leftPercent < 10 || leftPercent > 90) return;
        leftPanel.style.flex = `0 0 ${leftPercent}%`;
        rightPanel.style.flex = `0 0 ${100 - leftPercent}%`;
    });
    
    document.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            document.getElementById('leftFrame').style.pointerEvents = '';
            document.getElementById('rightFrame').style.pointerEvents = '';
        }
    });
})();

// Initial status
window.addEventListener('load', () => {
    setTimeout(() => {
        const leftStatus = document.getElementById('leftStatus');
        const rightStatus = document.getElementById('rightStatus');
        const leftVal = document.getElementById('leftSelect').value;
        const rightVal = document.getElementById('rightSelect').value;
        leftStatus.textContent = leftVal.split('/').pop();
        leftStatus.style.color = '#4ade80';
        rightStatus.textContent = rightVal.split('/').pop();
        rightStatus.style.color = '#4ade80';
    }, 3000);
});
</script>

</body>
</html>
