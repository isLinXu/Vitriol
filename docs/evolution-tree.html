-inc", "params": {"hidden_size": 8192, "num_hidden_layers": 64, "num_attention_heads": 64, "num_key_value_heads": null, "intermediate_size": 22016, "vocab_size": 125696, "max_position_embeddings": null, "model_type": "baichuan", "rope_type": "default", "is_moe": false, "num_experts": 1}, "innovations": []}, {"id": "Skywork/Skywork-13B", "name": "Skywork-13B", "shortName": "Skywork-13B", "family": "Skywork", "params": {"hidden_size": 4608, "num_hidden_layers": 52, "num_attention_heads": 36, "num_key_value_heads": null, "intermediate_size": 12288, "vocab_size": 65536, "max_position_embeddings": 4096, "model_type": "llama", "rope_type": "default", "is_moe": false, "num_experts": 1}, "innovations": [{"name": "Open Source", "description": "Fully Open Weights"}, {"name": "Long Context", "description": "4K-16K Context"}]}, {"id": "Skywork/Skywork-13B-chat", "name": "Skywork-13B-chat", "shortName": "Skywork-13B-chat", "family": "Skywork", "params": {"hidden_size": 4608, "num_hidden_layers": 52, "num_attention_heads": 36, "num_key_value_heads": null, "intermediate_size": 12288, "vocab_size": 65536, "max_position_embeddings": 4096, "model_type": "llama", "rope_type": "default", "is_moe": false, "num_experts": 1}, "innovations": []}, {"id": "Skywork/Skywork-MoE-13B", "name": "Skywork-MoE-13B", "shortName": "Skywork-MoE-13B", "family": "Skywork", "params": {"hidden_size": 4608, "num_hidden_layers": 52, "num_attention_heads": 36, "num_key_value_heads": null, "intermediate_size": 12288, "vocab_size": 65536, "max_position_embeddings": 4096, "model_type": "llama", "rope_type": "default", "is_moe": false, "num_experts": 1}, "innovations": [{"name": "MoE", "description": "Mixture of Experts"}, {"name": "SFT", "description": "Supervised Fine-Tuning"}]}, {"id": "Skywork/Skywork-13B-3k", "name": "Skywork-13B-3k", "shortName": "Skywork-13B-3k", "family": "Skywork", "params": {"hidden_size": 4608, "num_hidden_layers": 52, "num_attention_heads": 36, "num_key_value_heads": null, "intermediate_size": 12288, "vocab_size": 65536, "max_position_embeddings": 3072, "model_type": "llama", "rope_type": "default", "is_moe": false, "num_experts": 1}, "innovations": []}, {"id": "Skywork/Skywork-13B-16K", "name": "Skywork-13B-16K", "shortName": "Skywork-13B-16K", "family": "Skywork", "params": {"hidden_size": 4608, "num_hidden_layers": 52, "num_attention_heads": 36, "num_key_value_heads": null, "intermediate_size": 12288, "vocab_size": 65536, "max_position_embeddings": 16384, "model_type": "llama", "rope_type": "default", "is_moe": false, "num_experts": 1}, "innovations": []}];

        // Expose raw data for debugging/verification
        window.__TREE_DATA__ = treeData;

        // Family colors
        const familyColors = {"Qwen": "#06b6d4", "LLaMA": "#f59e0b", "DeepSeek": "#ef4444", "Mistral": "#8b5cf6", "GLM": "#10b981", "Kimi": "#ec4899", "GPT": "#6366f1", "Yi": "#f97316", "Phi": "#14b8a6", "Gemma": "#8b5cf6", "Starcoder": "#3b82f6", "BLOOM": "#84cc16", "Falcon": "#f43f5e", "Other": "#7c3aed"};

        // Current zoom state
        let currentZoom = 1;
        let showLabels = true;

        // Create SVG
        const container = document.getElementById('tree-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select('#tree-container')
            .append('svg')
            .attr('width', '100%')
            .attr('height', '100%')
            .call(d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    currentZoom = event.transform.k;
                    g.attr('transform', event.transform);
                }))
            .append('g');

        const g = svg.append('g')
            .attr('transform', `translate(${width / 2}, 60)`);

        // Build hierarchy
        //
        // NOTE:
        // 当前 treeData 是“模型条目数组”，并不包含显式 parent/links 字段。
        // 直接使用 d3.stratify() 会因为“多根节点/无 parent”而无法生成树。
        //
        // 这里采用“合成层级”的方式：Root → Family → Model。
        // 这能保证树始终可渲染，同时让结构至少在“家族分组”维度上保持可解释。
        const groups = d3.group(treeData, (d) => d.family || 'Other');
        const rootData = {
            id: 'root',
            name: 'LLM',
            shortName: 'LLM',
            family: 'Root',
            params: {},
            innovations: [],
            children: Array.from(groups, ([family, models]) => ({
                id: `family:${family}`,
                name: family,
                shortName: family,
                family,
                params: {},
                innovations: [],
                children: models
            }))
        };

        window.__TREE_RENDER_OK__ = false;
        try {
            const rootNode = d3.hierarchy(rootData, (d) => d.children);

        const treeLayout = d3.tree()
            .size([width - 200, height - 150])
            .separation((a, b) => (a.parent === b.parent ? 1.5 : 2.5));

            const tree = treeLayout(rootNode);

            // Draw links
            g.selectAll('.link')
                .data(tree.links())
                .enter()
                .append('path')
                .attr('class', 'link')
                .attr('d', d3.linkVertical()
                    .x(d => d.x - width / 2 + 100)
                    .y(d => d.y + 60));

            // Draw nodes
            const nodes = g.selectAll('.node')
                .data(tree.descendants())
                .enter()
                .append('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.x - width / 2 + 100}, ${d.y + 60})`);

            nodes.append('circle')
                .attr('r', d => d.depth === 0 ? 10 : (d.depth === 1 ? 9 : 7))
                .attr('fill', d => familyColors[d.data.family] || '#7c3aed')
                .on('mouseover', showTooltip)
                .on('mouseout', hideTooltip)
                .on('click', d => {
                    // Only open HuggingFace for actual model ids (org/repo).
                    if (typeof d.data.id === 'string' && d.data.id.includes('/')) {
                        window.open(`https://huggingface.co/${d.data.id}`, '_blank');
                    }
                });

            nodes.append('text')
                .attr('dy', 25)
                .text(d => d.data.shortName || d.data.name)
                .style('opacity', showLabels ? 1 : 0);

            window.__TREE_RENDER_OK__ = true;
        } catch (e) {
            console.error('[Vitriol] evolution-tree render failed:', e);
            const container = document.getElementById('tree-container');
            if (container) {
                container.innerHTML = `<div style=\"padding:16px;color:#ff7b7b;font-family:monospace\">Render failed: ${e.message}</div>`;
            }
        }

        // Tooltip functions
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            document.getElementById('tooltip-title').textContent = d.data.name;
            document.getElementById('tooltip-family').textContent =
                d.depth === 0 ? 'Root' : (d.depth === 1 ? `${d.data.family} Family (${d.children?.length || 0} models)` : d.data.family + ' Family');

            // Params
            const params = d.data.params || {};
            const paramsHtml = Object.entries(params).slice(0, 6).map(([k, v]) => `
                <div class="param">
                    <span>${k}</span><br>
                    <strong>${v || 'N/A'}</strong>
                </div>
            `).join('');
            document.getElementById('tooltip-params').innerHTML = paramsHtml;

            // Innovations
            const innovations = d.data.innovations || [];
            const innHtml = innovations.map(i =>
                `<span class="innovation">${i.name}</span>`
            ).join('');
            document.getElementById('tooltip-innovations').innerHTML =
                innovations.length ? `<strong>Innovations:</strong><br>${innHtml}` : '';

            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // Control functions
        function zoomIn() {
            svg.transition().call(d3.zoom().scaleBy, 1.3);
        }

        function zoomOut() {
            svg.transition().call(d3.zoom().scaleBy, 0.7);
        }

        function resetZoom() {
            svg.transition().call(d3.zoom().transform, d3.zoomIdentity);
        }

        function toggleLabels() {
            showLabels = !showLabels;
            g.selectAll('.node text')
                .transition()
                .style('opacity', showLabels ? 1 : 0);
        }
    </script>
