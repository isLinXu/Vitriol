<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitriol 3D Model Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r17/Stats.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #050508; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .node-label {
            color: #fff; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.9);
            pointer-events: none; white-space: nowrap; transform: translate(-50%, -50%);
            padding: 4px 10px; background: rgba(0,0,0,0.6); border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(8px);
        }
        .node-label.sub { font-size: 9px; text-transform: none; padding: 2px 6px; }
        .node-label.data-label {
            font-size: 8px; font-family: monospace; text-transform: none;
            background: rgba(0,0,0,0.8); border-color: rgba(96,165,250,0.3);
            color: #60a5fa;
        }
        .node-label.module-name {
            font-size: 10px; font-family: 'Monaco', monospace; text-transform: none;
            background: rgba(0,0,0,0.75); border-color: rgba(255,255,255,0.2);
        }
        .node-label.params-label {
            font-size: 7px; font-family: 'Monaco', monospace; text-transform: none;
            background: rgba(0,20,40,0.85); border-color: rgba(96,165,250,0.4); color: #7dd3fc;
        }
        
        .glass-panel {
            background: rgba(15, 18, 30, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        
        .nav-item {
            padding: 8px 14px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; font-size: 12px; display: flex;
            align-items: center; gap: 10px; margin: 2px 0;
        }
        .nav-item:hover { background: rgba(255,255,255,0.08); }
        .nav-item.active { background: rgba(59,130,246,0.3); border: 1px solid rgba(59,130,246,0.4); }
        
        .type-indicator { width: 10px; height: 10px; border-radius: 3px; box-shadow: 0 0 10px currentColor; }
        
        .stat-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 12px;
        }
        .stat-value { font-size: 20px; font-weight: 700; color: white; font-family: monospace; }
        .stat-label { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; }
        
        .control-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 10px 16px; color: white; font-size: 12px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .control-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .control-btn.active { background: rgba(59,130,246,0.4); border-color: rgba(59,130,246,0.5); }
        
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050508; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s;
        }
        .loader {
            width: 60px; height: 60px; border: 3px solid rgba(59,130,246,0.3);
            border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .model-badge {
            display: inline-block; padding: 2px 8px; background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.3); border-radius: 4px;
            font-size: 10px; color: #60a5fa; font-family: monospace;
        }
        
        .param-badge {
            display: inline-block; padding: 2px 6px; background: rgba(96,165,250,0.2);
            border: 1px solid rgba(96,165,250,0.3); border-radius: 4px;
            font-size: 10px; color: #60a5fa; font-family: monospace;
        }
        
        /* Context Menu */
        .context-menu {
            position: fixed; background: rgba(20, 25, 40, 0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
            padding: 8px 0; min-width: 180px; z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .context-menu-item {
            padding: 10px 16px; cursor: pointer; display: flex; align-items: center;
            gap: 10px; font-size: 12px; color: #e2e8f0; transition: all 0.15s;
        }
        .context-menu-item:hover { background: rgba(59,130,246,0.3); color: white; }
        .context-menu-item.disabled { opacity: 0.4; pointer-events: none; }
        .context-menu-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }
        
        /* Tooltip */
        .tooltip {
            position: fixed; background: rgba(10, 15, 25, 0.95); border: 1px solid rgba(96,165,250,0.3);
            border-radius: 8px; padding: 10px 14px; z-index: 999; max-width: 300px;
            pointer-events: none; font-size: 11px; color: #e2e8f0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .tooltip-title { font-weight: 600; color: white; margin-bottom: 6px; }
        .tooltip-row { display: flex; justify-content: space-between; gap: 20px; margin: 3px 0; }
        .tooltip-label { color: #64748b; }
        .tooltip-value { color: #60a5fa; font-family: monospace; }
        
        /* Comparison Panel */
        #comparisonPanel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 1000px; max-height: 80vh; z-index: 100;
            display: none;
        }
        #comparisonPanel.show { display: block; }
        .comparison-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 99; display: none;
        }
        .comparison-overlay.show { display: block; }
        
        /* Keyboard shortcuts hint */
        .shortcuts-hint {
            position: fixed; bottom: 70px; right: 20px; font-size: 10px;
            color: #475569; background: rgba(0,0,0,0.5); padding: 8px 12px;
            border-radius: 8px; line-height: 1.6;
        }
        .shortcuts-hint kbd {
            background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;
            font-family: monospace; margin-right: 4px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <p class="mt-4 text-gray-400 text-sm" id="loadingText">Loading Model Architecture...</p>
        <p class="mt-2 text-gray-600 text-xs" id="loadingModel"></p>
    </div>

    <div id="canvas-container"></div>

    <!-- Context Menu (hidden by default) -->
    <div id="contextMenu" class="context-menu" style="display: none;">
        <div class="context-menu-item" onclick="focusOnSelected()">🎯 Focus on Module</div>
        <div class="context-menu-item" onclick="expandModule()">📂 Expand Details</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="hideModule()">👁️ Hide Module</div>
        <div class="context-menu-item" onclick="showAllModules()">👁️ Show All</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="copyModuleConfig()">📋 Copy Config</div>
        <div class="context-menu-item" onclick="exportModulePNG()">📷 Export as PNG</div>
    </div>

    <!-- Tooltip (hidden by default) -->
    <div id="tooltip" class="tooltip" style="display: none;">
        <div class="tooltip-title" id="tooltipTitle"></div>
        <div id="tooltipContent"></div>
    </div>

    <!-- Header -->
    <div class="fixed top-0 left-0 right-0 p-4 flex justify-between items-start z-10 pointer-events-none">
        <div class="glass-panel px-4 py-3 pointer-events-auto">
            <h1 class="text-lg font-bold text-white" id="modelName">Vitriol Model Visualizer</h1>
            <p class="text-xs text-gray-400 font-mono" id="modelPath"></p>
        </div>
        
        <div class="glass-panel px-4 py-3 pointer-events-auto flex gap-4 text-xs" id="statsPanel">
            <!-- Dynamic stats -->
        </div>
    </div>

    <!-- Left Navigation -->
    <div class="fixed left-4 top-24 bottom-4 w-72 glass-panel flex flex-col z-10">
        <div class="p-3 border-b border-white/10">
            <input type="text" id="searchInput" placeholder="Search modules..." 
                   class="w-full bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
        </div>
        <div class="flex-1 overflow-y-auto p-2" id="navTree"></div>
        <div class="p-3 border-t border-white/10">
            <div class="text-xs text-gray-500 mb-2 uppercase">Legend</div>
            <div class="grid grid-cols-2 gap-1 text-xs">
                <div class="flex items-center gap-2 p-1"><div class="type-indicator" style="background:#3b82f6"></div><span class="text-gray-300">Input</span></div>
                <div class="flex items-center gap-2 p-1"><div class="type-indicator" style="background:#06b6d4"></div><span class="text-gray-300">Attention</span></div>
                <div class="flex items-center gap-2 p-1"><div class="type-indicator" style="background:#f59e0b"></div><span class="text-gray-300">MoE</span></div>
                <div class="flex items-center gap-2 p-1"><div class="type-indicator" style="background:#8b5cf6"></div><span class="text-gray-300">Expert</span></div>
                <div class="flex items-center gap-2 p-1"><div class="type-indicator" style="background:#10b981"></div><span class="text-gray-300">FFN</span></div>
                <div class="flex items-center gap-2 p-1"><div class="type-indicator" style="background:#ef4444"></div><span class="text-gray-300">Output</span></div>
            </div>
        </div>
    </div>

    <!-- View Controls Panel -->
    <div class="fixed top-24 right-4 glass-panel p-2 flex flex-col gap-2 z-10" id="viewControls">
        <button onclick="setPresetView('top')" class="control-btn text-xs justify-center" title="Bird's Eye View">🦅 Top</button>
        <button onclick="setPresetView('front')" class="control-btn text-xs justify-center" title="Front View">📱 Front</button>
        <button onclick="setPresetView('side')" class="control-btn text-xs justify-center" title="Side View">📐 Side</button>
        <button onclick="resetCamera()" class="control-btn text-xs justify-center" title="Reset View">🏠 Reset</button>
        <div class="border-t border-white/10 my-1"></div>
        <button onclick="exportPNGViz()" class="control-btn text-xs justify-center" title="Save as PNG">📷 PNG</button>
        <button onclick="exportHTMLViz()" class="control-btn text-xs justify-center" title="Export Standalone HTML">📦 HTML</button>
    </div>

    <!-- Right Detail Panel -->
    <div class="fixed right-4 top-64 w-80 glass-panel flex flex-col z-10 max-h-[calc(100vh-280px)]" id="detailPanel" style="display: none;">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <div>
                <div class="text-xs text-blue-400 uppercase" id="detailType">Model</div>
                <h3 class="text-xl font-bold text-white" id="detailTitle">Overview</h3>
            </div>
            <button onclick="closeDetail()" class="text-gray-400 hover:text-white">✕</button>
        </div>
        <div class="p-4 overflow-y-auto flex-1" id="detailContent"></div>
        <div class="p-3 border-t border-white/10 flex gap-2">
            <button onclick="copyConfig()" class="flex-1 control-btn text-xs">📋 Copy Config</button>
            <button onclick="exportDetailPNG()" class="flex-1 control-btn text-xs">📷 Export</button>
        </div>
    </div>

    <!-- Comparison Panel -->
    <div id="comparisonOverlay" class="comparison-overlay"></div>
    <div id="comparisonPanel" class="glass-panel">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <h3 class="text-lg font-bold text-white">Model Comparison</h3>
            <div class="flex gap-2">
                <button onclick="addModelToCompare()" class="control-btn text-xs">+ Add Model</button>
                <button onclick="closeComparison()" class="text-gray-400 hover:text-white">✕</button>
            </div>
        </div>
        <div class="p-4 overflow-y-auto max-h-[60vh]" id="comparisonContent">
            <!-- Comparison table will be generated here -->
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 glass-panel px-4 py-2 flex gap-2 z-10">
        <button onclick="expandAll()" class="control-btn">▼ Expand</button>
        <button onclick="collapseAll()" class="control-btn">▶ Collapse</button>
        <button onclick="resetCamera()" class="control-btn">🎯 Reset</button>
        <button onclick="toggleLayout()" class="control-btn" id="layoutBtn">📐 3D</button>
        <button onclick="toggleFlow()" class="control-btn active" id="flowBtn">🌊 Flow</button>
        <button onclick="toggleLabels()" class="control-btn active" id="labelsBtn">🏷️ Labels</button>
        <button onclick="toggleCompare()" class="control-btn" id="compareBtn">⚖️ Compare</button>
        <button onclick="exportFullPNG()" class="control-btn">📷 Screenshot</button>
    </div>

    <!-- Keyboard Shortcuts Hint -->
    <div class="shortcuts-hint">
        <kbd>R</kbd>Reset <kbd>F</kbd>Focus <kbd>H</kbd>Labels <kbd>Esc</kbd>Close
    </div>

    <script>
        // Colors
        const colors = {
            input: 0x3b82f6, embedding: 0x3b82f6, attention: 0x06b6d4, moe: 0xf59e0b,
            expert: 0x8b5cf6, expert_active: 0xa855f7, ffn: 0x10b981, output: 0xef4444,
            shared: 0xec4899, router: 0xf97316, norm: 0x64748b, connection: 0x3b82f6, flow: 0x60a5fa,
            linear_attn: 0x14b8a6
        };

        let scene, camera, renderer, labelRenderer, controls, stats;
        let nodes = [], connections = [], flowParticles = [], layerGroups = [], pipeMeshes = [];
        let modelConfig = null;
        let is3D = true, showFlow = true, showLabels = true;
        let raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        let collapsedLayers = new Set();
        let selectedObject = null;
        let highlightedObject = null;
        let compareModels = [];
        let modelLayers = []; // Store layers globally for nav tree functions

        // INLINE_CONFIG_MARKER

        // ============================================
        // Model Configuration Parser (Dynamic)
        // ============================================
        async function loadModelConfig(path) {
            document.getElementById('loadingModel').textContent = path;

            // Check for inline config first (set by CLI to avoid fetch on file:// protocol)
            if (window.__INLINE_MODEL_CONFIG__) {
                modelConfig = parseConfig(window.__INLINE_MODEL_CONFIG__.raw || window.__INLINE_MODEL_CONFIG__, window.__INLINE_MODEL_CONFIG__.meta);
                document.getElementById('loadingText').textContent = `Loading ${modelConfig.name}...`;
                return modelConfig;
            }

            // ── HuggingFace remote loading ──────────────────────────────────
            // Supports: hf://org/repo  or  hf://org/repo/revision
            // Fetches from https://huggingface.co/<repo>/resolve/main/<file>
            if (path.startsWith('hf://')) {
                const hfRepo = path.slice(5); // remove "hf://"
                const hfBase = `https://huggingface.co/${hfRepo}/resolve/main`;
                document.getElementById('loadingText').textContent = `Loading from HuggingFace: ${hfRepo}...`;
                
                try {
                    // Fetch config.json, meta-config.json, config_meta.json, and model info in parallel
                    const [configResp, metaResp, legacyMetaResp, modelInfoResp] = await Promise.allSettled([
                        fetch(`${hfBase}/config.json`),
                        fetch(`${hfBase}/meta-config.json`),
                        fetch(`${hfBase}/config_meta.json`),
                        fetch(`https://huggingface.co/api/models/${hfRepo}`)
                    ]);

                    if (configResp.status !== 'fulfilled' || !configResp.value.ok) {
                        throw new Error(`Cannot fetch config.json from HuggingFace: ${hfRepo}`);
                    }

                    const config = await configResp.value.json();
                    
                    // Priority: meta-config.json > config_meta.json > null
                    let meta = null;
                    if (metaResp.status === 'fulfilled' && metaResp.value.ok) {
                        try { meta = await metaResp.value.json(); console.log('Loaded meta-config.json from HF'); } catch(e) {}
                    }
                    if (!meta && legacyMetaResp.status === 'fulfilled' && legacyMetaResp.value.ok) {
                        try { meta = await legacyMetaResp.value.json(); console.log('Loaded config_meta.json from HF'); } catch(e) {}
                    }

                    // Fetch model info for parameter count
                    let modelInfo = null;
                    if (modelInfoResp.status === 'fulfilled' && modelInfoResp.value.ok) {
                        try { 
                            modelInfo = await modelInfoResp.value.json(); 
                            console.log('Loaded model info from HF API'); 
                        } catch(e) {}
                    }

                    // Use meta (original config) for visualization if available
                    const effectiveConfig = meta || config;
                    modelConfig = parseConfig(effectiveConfig, meta ? config : null, modelInfo);
                    document.getElementById('loadingText').textContent = `Loading ${modelConfig.name}...`;
                    return modelConfig;
                } catch (error) {
                    console.warn('HuggingFace remote load failed:', error);
                    document.getElementById('loadingText').textContent = `HF load failed: ${error.message}`;
                    return getDefaultConfigForPath(path);
                }
            }

            // ── Local / relative path loading ───────────────────────────────
            try {
                const configUrl = path.endsWith('/') ? path + 'config.json' : path + '/config.json';
                const metaConfigUrl = path.endsWith('/') ? path + 'meta-config.json' : path + '/meta-config.json';
                const legacyMetaUrl = path.endsWith('/') ? path + 'config_meta.json' : path + '/config_meta.json';
                
                const [configResponse, metaConfigResponse, legacyMetaResponse] = await Promise.allSettled([
                    fetch(configUrl),
                    fetch(metaConfigUrl),
                    fetch(legacyMetaUrl)
                ]);

                if (configResponse.status !== 'fulfilled' || !configResponse.value.ok) {
                    throw new Error('Config not found');
                }

                const config = await configResponse.value.json();
                
                // Priority: meta-config.json > config_meta.json > null
                let meta = null;
                if (metaConfigResponse.status === 'fulfilled' && metaConfigResponse.value.ok) {
                    try { meta = await metaConfigResponse.value.json(); } catch(e) {}
                }
                if (!meta && legacyMetaResponse.status === 'fulfilled' && legacyMetaResponse.value.ok) {
                    try { meta = await legacyMetaResponse.value.json(); } catch(e) {}
                }

                // Use meta (original config) for visualization if available
                const effectiveConfig = meta || config;
                modelConfig = parseConfig(effectiveConfig, meta ? config : null, null);
                document.getElementById('loadingText').textContent = `Loading ${modelConfig.name}...`;
                return modelConfig;
            } catch (error) {
                console.warn('Cannot load config.json, using demo data:', error);
                return getDefaultConfigForPath(path);
            }
        }

        function parseConfig(config, meta = null, modelInfo = null) {
            const textConfig = config.text_config || config;
            const visionConfig = config.vision_config || {};
            
            // Prefer meta if available for certain fields
            const name = meta?.model_type || config.name || config.model_name || config.architectures?.[0] || 'Unknown Model';
            const vocabSize = meta?.vocab_size || config.vocab_size || textConfig.vocab_size || 248320;
            const hiddenSize = meta?.hidden_size || config.hidden_size || textConfig.hidden_size || 256;
            
            // Extract layer counts
            const textLayers = meta?.n_layer || textConfig.num_hidden_layers || textConfig.num_layers || 0;
            const textLayerTypes = textConfig.layer_types || [];
            
            const visionLayers = visionConfig.num_hidden_layers || visionConfig.depth || 0;
            const isMultimodal = !!config.vision_config && Object.keys(config.vision_config).length > 0;
            
            // If the root config has its own layers (like MoE layers post-fusion)
            let rootLayers = 0;
            let rootLayerTypes = [];
            // Only use root layers if they are distinct from text_config, or if text_config is missing
            if (config.num_hidden_layers && config.num_hidden_layers !== textLayers || (config.layer_types && config.layer_types !== textLayerTypes)) {
                rootLayers = config.num_hidden_layers;
                rootLayerTypes = config.layer_types || [];
            } else if (!config.text_config) {
                // Fallback for models without text_config
                rootLayers = config.num_hidden_layers || 2;
                rootLayerTypes = config.layer_types || [];
            } else if (config.num_experts > 0) {
                rootLayers = config.num_hidden_layers || 2;
                rootLayerTypes = config.layer_types || [];
            }
            
            const numLayers = textLayers + rootLayers; // Total layers for stats

            const numHeads = meta?.n_head || config.num_attention_heads || textConfig.num_attention_heads || 16;
            const numKvHeads = config.num_key_value_heads || textConfig.num_key_value_heads || numHeads;
            const headDim = config.head_dim || textConfig.head_dim || Math.ceil(hiddenSize / numHeads);
            const intermediateSize = config.intermediate_size || textConfig.intermediate_size || hiddenSize * 4;
            
            const numExperts = config.num_experts || textConfig.num_experts || 0;
            const expertsPerTok = config.num_experts_per_tok || textConfig.num_experts_per_tok || 2;
            const expertSize = config.moe_intermediate_size || textConfig.moe_intermediate_size || 64;
            const isMoE = numExperts > 0;
            
            // DeepSeek V4 specific parameters
            const firstKDense = config.first_k_dense_replace || textConfig.first_k_dense_replace || 0;
            const nSharedExperts = config.n_shared_experts || textConfig.n_shared_experts || 0;
            const qLoraRank = config.q_lora_rank || textConfig.q_lora_rank || 0;
            const vHeadDim = config.v_head_dim || textConfig.v_head_dim || headDim;
            const qkNopeHeadDim = config.qk_nope_head_dim || textConfig.qk_nope_head_dim || 0;
            const qkRopeHeadDim = config.qk_rope_head_dim || textConfig.qk_rope_head_dim || 0;
            const isDeepSeekV4 = config.model_type === 'deepseek_v4' || textConfig.model_type === 'deepseek_v4';
            const tieWordEmbeddings = config.tie_word_embeddings || textConfig.tie_word_embeddings || false;
            
            // Calculate total parameters
            let totalParams = null;
            
            // Priority 1: Use modelInfo from HuggingFace API (most accurate)
            if (modelInfo && modelInfo.safetensors && modelInfo.safetensors.parameters) {
                const params = modelInfo.safetensors.parameters;
                totalParams = 0;
                for (const [dtype, count] of Object.entries(params)) {
                    totalParams += count;
                }
                console.log(`Using parameter count from HF API: ${totalParams}`);
            }
            
            // Priority 2: Calculate from config if no modelInfo
            if (totalParams === null) {
                totalParams = vocabSize * hiddenSize; // Embedding
                if (!tieWordEmbeddings) {
                    totalParams += hiddenSize * vocabSize; // LM Head
                }
                
                // Calculate per-layer parameters
                let layerParams = 0;
                
                if (isDeepSeekV4 && qLoraRank > 0) {
                    // DeepSeek V4 MLA attention
                    const qParams = hiddenSize * qLoraRank + qLoraRank * (numHeads * headDim);
                    const kvParams = 2 * hiddenSize * (numKvHeads * vHeadDim);
                    const oParams = (numHeads * headDim) * hiddenSize;
                    layerParams += qParams + kvParams + oParams;
                } else {
                    // Standard attention
                    layerParams += hiddenSize * 3 * hiddenSize; // QKV projection
                    layerParams += hiddenSize * hiddenSize; // Output projection
                }
                
                // LayerNorm parameters (2 * hiddenSize per layer)
                layerParams += 2 * hiddenSize;
                
                if (isMoE) {
                    // Mixed architecture: first_k_dense layers are dense, rest are MoE
                    let denseLayerParams = 0;
                    let moeLayerParams = 0;
                    
                    // Dense FFN (SwiGLU: up, gate, down)
                    denseLayerParams += 3 * hiddenSize * intermediateSize;
                    
                    // MoE FFN
                    moeLayerParams += hiddenSize * numExperts; // Router
                    if (nSharedExperts > 0) {
                        moeLayerParams += nSharedExperts * 3 * hiddenSize * expertSize;
                    }
                    moeLayerParams += numExperts * 3 * hiddenSize * expertSize; // Routed experts
                    
                    const denseLayers = Math.min(firstKDense, numLayers);
                    const moeLayers = numLayers - denseLayers;
                    
                    totalParams += denseLayers * (layerParams + denseLayerParams);
                    totalParams += moeLayers * (layerParams + moeLayerParams);
                } else {
                    // Standard dense FFN
                    layerParams += intermediateSize * hiddenSize; // FFN up
                    layerParams += hiddenSize * intermediateSize; // FFN down
                    totalParams += layerParams * numLayers;
                }
            }
            
            return {
                name,
                vocabSize,
                hiddenSize,
                numLayers,
                numHeads,
                numKvHeads,
                headDim,
                intermediateSize,
                numExperts,
                expertsPerTok,
                expertSize,
                isMoE,
                isMultimodal,
                visionLayers,
                textLayers,
                textLayerTypes,
                rootLayers,
                rootLayerTypes,
                totalParams,
                firstKDense,
                nSharedExperts,
                isDeepSeekV4,
                raw: config
            };
        }

        // Get default config for models without config.json

            const name = path.split('/').pop().replace('-Vitriol-ultra-dummy', '');

        // ============================================
        // Enhanced Module Creation with Detailed Info
        // ============================================
        function createModule(group, name, pos, size, color, data) {
            const geometry = new THREE.BoxGeometry(size[0], size[1], size[2]);
            
            // Create gradient-like material
            const material = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0.85,
                shininess: 80,
                specular: 0x444444
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(pos[0], pos[1], pos[2]);
            mesh.userData = { name, data, color, originalOpacity: 0.85 };
            group.add(mesh);

            // Add glowing edges
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.6 
            });
            const wireframe = new THREE.LineSegments(edges, lineMaterial);
            wireframe.position.copy(mesh.position);
            wireframe.userData = { isEdge: true, parentMesh: mesh };
            group.add(wireframe);

            // Module name label
            if (showLabels) {
                const labelDiv = document.createElement('div');
                labelDiv.className = 'node-label module-name';
                labelDiv.textContent = name;
                const label = new THREE.CSS2DObject(labelDiv);
                label.position.set(pos[0], pos[1] + size[1]/2 + 2, pos[2]);
                group.add(label);
            }

            // Parameters/info label (if available)
            if (data && (data.params || data.weight)) {
                const infoDiv = document.createElement('div');
                infoDiv.className = 'node-label params-label';
                infoDiv.textContent = data.params || data.weight;
                const infoLabel = new THREE.CSS2DObject(infoDiv);
                infoLabel.position.set(pos[0], pos[1] - size[1]/2 - 2, pos[2]);
                group.add(infoLabel);
            }

            nodes.push(mesh);
            return mesh;
        }

        // ============================================
        // Enhanced Pipe Connections with 3D Effect
        // ============================================
        function createPipe(fromPos, toPos, color = colors.connection, label = '', active = true) {
            const from = new THREE.Vector3(...fromPos);
            const to = new THREE.Vector3(...toPos);
            
            // Calculate pipe path (slightly curved for visual appeal)
            const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
            mid.y += 1; // Slight upward curve
            
            // Create tube geometry along the path
            const curve = new THREE.QuadraticBezierCurve3(from, mid, to);
            const tubeGeometry = new THREE.TubeGeometry(curve, 16, 0.08, 8, false);
            
            const tubeMaterial = new THREE.MeshPhongMaterial({
                color: active ? color : 0x333333,
                transparent: true,
                opacity: active ? 0.7 : 0.3,
                emissive: active ? color : 0x000000,
                emissiveIntensity: active ? 0.3 : 0,
                depthWrite: false
            });
            
            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            scene.add(tube);
            pipeMeshes.push(tube);
            
            // Add connection label
            if (label && showLabels) {
                const labelDiv = document.createElement('div');
                labelDiv.className = 'node-label data-label';
                labelDiv.textContent = label;
                const cssLabel = new THREE.CSS2DObject(labelDiv);
                cssLabel.position.copy(mid);
                scene.add(cssLabel);
            }
            
            return tube;
        }

        function createInternalPipe(group, fromPos, toPos, label = '', active = true) {
            const from = new THREE.Vector3(...fromPos);
            const to = new THREE.Vector3(...toPos);
            const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
            
            // Create a curved tube
            const curve = new THREE.QuadraticBezierCurve3(from, mid, to);
            const tubeGeometry = new THREE.TubeGeometry(curve, 12, 0.06, 6, false);
            
            const tubeMaterial = new THREE.MeshPhongMaterial({
                color: active ? colors.flow : 0x333333,
                transparent: true,
                opacity: active ? 0.6 : 0.25,
                emissive: active ? colors.flow : 0x000000,
                emissiveIntensity: active ? 0.2 : 0,
                depthWrite: false
            });
            
            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            group.add(tube);
            pipeMeshes.push(tube);
        }

        // ============================================
        // Inter-Layer Connections
        // ============================================
        function createInterLayerConnections() {
            if (layerGroups.length < 2) return;
            
            for (let i = 0; i < layerGroups.length - 1; i++) {
                const current = layerGroups[i];
                const next = layerGroups[i + 1];
                
                // Get vertical span of each layer
                const currentY = current.group.position.y;
                const nextY = next.group.position.y;
                
                // Create main vertical pipe connecting layers
                const pipeHeight = Math.abs(nextY - currentY) - 15;
                const pipeY = (currentY + nextY) / 2;
                
                // Main feedforward pipe (center)
                const mainPipeGeo = new THREE.CylinderGeometry(0.5, 0.5, Math.max(0.1, pipeHeight), 8);
                const mainPipeMat = new THREE.MeshPhongMaterial({
                    color: colors.connection,
                    transparent: true,
                    opacity: 0.4,
                    emissive: colors.connection,
                    emissiveIntensity: 0.1,
                    depthWrite: false
                });
                const mainPipe = new THREE.Mesh(mainPipeGeo, mainPipeMat);
                mainPipe.position.set(0, pipeY, 0);
                scene.add(mainPipe);
                pipeMeshes.push(mainPipe);
                
                // Create flow particles along the pipe
                if (showFlow) {
                    createFlowParticle(mainPipe.position, pipeHeight, colors.flow);
                }
                
                // Side pipes for skip connections
                [-15, 15].forEach(x => {
                    const sidePipeGeo = new THREE.CylinderGeometry(0.25, 0.25, Math.max(0.1, pipeHeight), 6);
                    const sidePipeMat = new THREE.MeshPhongMaterial({
                        color: colors.ffn,
                        transparent: true,
                        opacity: 0.25,
                        depthWrite: false
                    });
                    const sidePipe = new THREE.Mesh(sidePipeGeo, sidePipeMat);
                    sidePipe.position.set(x, pipeY, 0);
                    scene.add(sidePipe);
                    pipeMeshes.push(sidePipe);
                });
            }
        }

        // ============================================
        // Flow Particles Animation
        // ============================================
        function createFlowParticle(position, height, color) {
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const geo = new THREE.SphereGeometry(0.15, 8, 8);
                const mat = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.8,
                    depthWrite: false
                });
                const particle = new THREE.Mesh(geo, mat);
                
                // Random offset
                particle.position.set(
                    position.x + (Math.random() - 0.5) * 0.5,
                    position.y + (Math.random() - 0.5) * height * 0.8,
                    position.z + (Math.random() - 0.5) * 0.5
                );
                
                particle.userData = {
                    baseY: particle.position.y,
                    speed: 0.5 + Math.random() * 0.5,
                    offset: Math.random() * Math.PI * 2
                };
                
                scene.add(particle);
                flowParticles.push(particle);
            }
        }

        function updateFlowParticles() {
            if (!showFlow) return;
            
            const time = Date.now() * 0.001;
            flowParticles.forEach(p => {
                const y = p.userData.baseY + Math.sin(time * p.userData.speed + p.userData.offset) * 2;
                p.position.y = y;
                p.material.opacity = 0.4 + Math.sin(time * 2) * 0.3;
            });
        }

        // ============================================
        // Build Model (Enhanced with detailed info)
        // ============================================
        function buildModel(cfg) {
            updateStatsPanel(cfg);
            updateDetailPanel(cfg);
            
            modelLayers = [];
            
            // INPUT
            modelLayers.push({
                name: 'INPUT', y: 50, type: 'input',
                modules: [{
                    name: 'TokenInput', pos: [0, 0, 0], size: [12, 3, 5], color: colors.input,
                    data: { 
                        shape: '[batch, seq_len]', 
                        dtype: 'int64', 
                        desc: 'Input token IDs',
                        max_seq_len: 32768,
                        batch_size: 'dynamic'
                    }
                }]
            });

            // EMBEDDING
            modelLayers.push({
                name: 'EMBEDDING', y: 38, type: 'embedding',
                modules: [
                    { name: 'TokenEmbed', pos: [-10, 0, 0], size: [10, 4, 5], color: colors.embedding,
                      data: { 
                          weight: `[V, H]`, 
                          shape: `[${cfg.vocabSize}, ${cfg.hiddenSize}]`, 
                          params: formatParams(cfg.vocabSize * cfg.hiddenSize), 
                          dtype: 'float16',
                          desc: 'Token embedding' }},
                    { name: 'PosEmbed', pos: [0, 0, 0], size: [10, 4, 5], color: colors.embedding,
                      data: { 
                          weight: `[2048, H]`, 
                          shape: `[2048, ${cfg.hiddenSize}]`, 
                          params: formatParams(2048 * cfg.hiddenSize), 
                          dtype: 'float16',
                          desc: 'Rotary positional encoding' }},
                    { name: 'Dropout', pos: [10, 0, 0], size: [6, 3, 4], color: colors.norm,
                      data: { p: 0.1, desc: 'Embedding dropout' }}
                ],
                connections: [
                    { from: 'TokenEmbed', to: 'Dropout', label: 'embed' },
                    { from: 'PosEmbed', to: 'Dropout', label: 'pos' }
                ]
            });

            // VISION ENCODER (if multimodal)
            let currentY = 22; // Start position after embeddings
            const layerSpacing = cfg.isMoE ? 35 : 22; // Increased spacing for better visibility
            
            // TEXT ENCODER LAYERS
            for (let i = 0; i < cfg.textLayers; i++) {
                const layerY = currentY;
                
                let lType = cfg.textLayerTypes[i] || 'dense';
                let layerName = `TEXT_ENCODER_L${i}`;
                
                if (lType === 'moe') {
                    let layer = buildMoELayer(i, layerY, cfg);
                    layer.name = layerName;
                    modelLayers.push(layer);
                } else if (lType === 'linear_attention') {
                    let layer = buildLinearAttentionLayer(i, layerY, cfg);
                    layer.name = layerName;
                    modelLayers.push(layer);
                } else {
                    let layer = buildDenseLayer(i, layerY, cfg);
                    layer.name = layerName;
                    modelLayers.push(layer);
                }
                currentY -= layerSpacing;
            }

            if (cfg.isMultimodal) {
                modelLayers.push({
                    name: 'VISION_ENCODER', y: currentY, type: 'attention',
                    modules: [
                        { name: 'PatchEmbed', pos: [-10, 0, 0], size: [10, 4, 5], color: colors.embedding,
                          data: { 
                              patch_size: '14x14', 
                              in_channels: 3,
                              desc: 'Image patch embedding' }},
                        { name: `ViT_${cfg.visionLayers}L`, pos: [0, 0, 0], size: [12, 6, 6], color: colors.attention,
                          data: { 
                              layers: cfg.visionLayers, 
                              heads: cfg.numHeads,
                              hidden: cfg.hiddenSize,
                              desc: 'Vision Transformer blocks' }},
                        { name: 'VisionProj', pos: [12, 0, 0], size: [8, 4, 5], color: colors.embedding,
                          data: { 
                              shape: `[${cfg.hiddenSize}, ${cfg.hiddenSize}]`,
                              desc: 'Vision-language projection' }}
                    ],
                    connections: [
                        { from: 'PatchEmbed', to: `ViT_${cfg.visionLayers}L`, label: 'patches' },
                        { from: `ViT_${cfg.visionLayers}L`, to: 'VisionProj', label: 'features' }
                    ]
                });
                currentY -= layerSpacing;
            }

            // ROOT LAYERS
            for (let i = 0; i < cfg.rootLayers; i++) {
                const layerY = currentY;
                
                let lType = cfg.rootLayerTypes[i] || (cfg.isMoE ? 'moe' : 'dense');
                let layerName = cfg.isMoE ? `MOE_LAYER_${i}` : `TRANSFORMER_L${i}`;
                
                if (lType === 'moe') {
                    let layer = buildMoELayer(i, layerY, cfg);
                    layer.name = layerName;
                    modelLayers.push(layer);
                } else if (lType === 'linear_attention') {
                    let layer = buildLinearAttentionLayer(i, layerY, cfg);
                    layer.name = layerName;
                    modelLayers.push(layer);
                } else {
                    let layer = buildDenseLayer(i, layerY, cfg);
                    layer.name = layerName;
                    modelLayers.push(layer);
                }
                currentY -= layerSpacing;
            }

            // OUTPUT
            const outputY = currentY - 10;
            modelLayers.push({
                name: 'OUTPUT', y: outputY, type: 'output',
                modules: [
                    { name: 'FinalNorm', pos: [-8, 0, 0], size: [7, 3, 4], color: colors.norm,
                      data: { eps: '1e-6', desc: 'Final layer normalization' }},
                    { name: 'LM_Head', pos: [0, 0, 0], size: [10, 5, 5], color: colors.output,
                      data: { 
                          weight: `[H, V]`, 
                          shape: `[${cfg.hiddenSize}, ${cfg.vocabSize}]`, 
                          params: formatParams(cfg.hiddenSize * cfg.vocabSize), 
                          dtype: 'float16',
                          desc: 'Language modeling head' }},
                    { name: 'Logits', pos: [10, 0, 0], size: [7, 4, 4], color: colors.output,
                      data: { 
                          shape: `[batch, seq, V]`, 
                          vocab: cfg.vocabSize.toLocaleString(),
                          desc: 'Output logits' }}
                ],
                connections: [
                    { from: 'FinalNorm', to: 'LM_Head', label: 'hidden' },
                    { from: 'LM_Head', to: 'Logits', label: 'logits' }
                ]
            });

            // Build layers in scene
            modelLayers.forEach(layer => {
                const group = new THREE.Group();
                group.position.y = layer.y;
                scene.add(group);

                // Calculate bounds for dynamic enclosure
                let minX = -25, maxX = 25, minZ = -17.5, maxZ = 17.5;
                if (layer.type === 'moe') {
                    const displayExperts = Math.min(cfg.numExperts, 16);
                    if (displayExperts > 4) {
                        const numCols = Math.min(displayExperts, Math.ceil(Math.sqrt(displayExperts)));
                        const numRows = Math.ceil(displayExperts / numCols);
                        maxZ = Math.max(17.5, (numRows * 7) / 2 + 15);
                        minZ = -maxZ;
                        maxX = Math.max(25, (numCols * 7) / 2 + 15);
                        minX = -maxX;
                    }
                }

                // Enclosure with stronger visual
                const boxHeight = layer.type === 'moe' ? 26 : (layer.type === 'attention' ? 24 : 18);
                // Expand the box to accommodate all internal modules.
                // We'll calculate min/max over all module positions just to be safe.
                let modMinX = minX, modMaxX = maxX, modMinZ = minZ, modMaxZ = maxZ;
                layer.modules.forEach(m => {
                    if (m.pos[0] - m.size[0]/2 < modMinX) modMinX = m.pos[0] - m.size[0]/2 - 5;
                    if (m.pos[0] + m.size[0]/2 > modMaxX) modMaxX = m.pos[0] + m.size[0]/2 + 5;
                    if (m.pos[2] - m.size[2]/2 < modMinZ) modMinZ = m.pos[2] - m.size[2]/2 - 5;
                    if (m.pos[2] + m.size[2]/2 > modMaxZ) modMaxZ = m.pos[2] + m.size[2]/2 + 5;
                });
                
                const encGeo = new THREE.BoxGeometry(modMaxX - modMinX, boxHeight, modMaxZ - modMinZ);
                const encMat = new THREE.MeshBasicMaterial({
                    color: colors[layer.type], transparent: true, opacity: 0.03, side: THREE.DoubleSide, depthWrite: false
                });
                const boxMesh = new THREE.Mesh(encGeo, encMat);
                boxMesh.position.set((modMinX + modMaxX)/2, 0, (modMinZ + modMaxZ)/2);
                group.add(boxMesh);

                // Wireframe
                const edges = new THREE.EdgesGeometry(encGeo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
                    color: colors[layer.type], transparent: true, opacity: 0.15, depthWrite: false
                }));
                line.position.set((modMinX + modMaxX)/2, 0, (modMinZ + modMaxZ)/2);
                group.add(line);

                // Layer label with count
                const labelDiv = document.createElement('div');
                labelDiv.className = 'node-label';
                labelDiv.textContent = layer.name;
                
                // Add safe toString conversion for color
                let layerColor = colors[layer.type];
                if (layerColor !== undefined) {
                    labelDiv.style.color = '#' + layerColor.toString(16).padStart(6, '0');
                } else {
                    labelDiv.style.color = '#ffffff'; // Fallback color
                }
                
                const label = new THREE.CSS2DObject(labelDiv);
                label.position.set(0, 11, 0);
                group.add(label);

                const layerGroup = { name: layer.name, group, type: layer.type, modules: [] };
                layerGroups.push(layerGroup);

                // Modules
                layer.modules.forEach(m => {
                    const mesh = createModule(group, m.name, m.pos, m.size, m.color, m.data);
                    layerGroup.modules.push({ name: m.name, mesh, data: m.data });
                });

                // Internal connections
                if (layer.connections) {
                    layer.connections.forEach(c => {
                        const from = layer.modules.find(m => m.name === c.from);
                        const to = layer.modules.find(m => m.name === c.to);
                        if (from && to) {
                            createInternalPipe(group, from.pos, to.pos, c.label, c.active !== false);
                        } else {
                            // Suppress warning for missing nodes if they are intentionally hidden
                            if (!c.to.startsWith('...')) {
                                console.warn(`Connection missing endpoints: ${c.from} -> ${c.to}`);
                            }
                        }
                    });
                }
            });

            // Inter-layer connections
            createInterLayerConnections();
            
            // Build navigation tree
            buildNavTree(modelLayers);

            // Add grid at the bottom
            const grid = new THREE.GridHelper(500, 100, 0x1a1a3e, 0x0f0f1a);
            grid.position.y = outputY - 20;
            scene.add(grid);
            
            // Adjust camera to fit the whole model
            const totalHeight = Math.abs(outputY - 50);
            camera.position.set(totalHeight * 0.8, 0, totalHeight);
            
            // Fix: ensure the camera's far clipping plane is large enough so objects don't disappear when rotating/zooming
            camera.far = Math.max(5000, totalHeight * 5);
            camera.updateProjectionMatrix();
            
            controls.target.set(0, (50 + outputY) / 2, 0);
            controls.update();
        }

        function buildDenseLayer(idx, y, cfg) {
            return {
                name: `DENSE_L${idx}`, y, type: 'attention',
                modules: [
                    { name: `RMSNorm1_${idx}`, pos: [-15, 6, 0], size: [5, 3, 3], color: colors.norm, 
                      data: { eps: '1e-6', desc: 'Pre-attention normalization' }},
                    { name: `QKV_${idx}`, pos: [-8, 6, 0], size: [6, 4, 3], color: colors.attention,
                      data: { 
                          weight: `[3H, H]`,
                          shape: `[${3 * cfg.hiddenSize}, ${cfg.hiddenSize}]`,
                          params: formatParams(cfg.hiddenSize * 3 * cfg.hiddenSize),
                          heads: `${cfg.numHeads}Q + ${cfg.numKvHeads}K/V`,
                          head_dim: cfg.headDim,
                          desc: 'Query/Key/Value projection' }},
                    { name: `Attn_${idx}`, pos: [0, 6, 0], size: [8, 4, 4], color: colors.attention,
                      data: { 
                          type: 'GQA',
                          heads: cfg.numHeads,
                          kv_heads: cfg.numKvHeads,
                          desc: 'Grouped Query Attention' }},
                    { name: `Proj_${idx}`, pos: [8, 6, 0], size: [6, 4, 3], color: colors.attention,
                      data: { 
                          weight: `[H, H]`,
                          shape: `[${cfg.hiddenSize}, ${cfg.hiddenSize}]`,
                          params: formatParams(cfg.hiddenSize * cfg.hiddenSize),
                          desc: 'Output projection' }},
                    { name: `Add1_${idx}`, pos: [15, 6, 0], size: [4, 3, 3], color: colors.ffn, 
                      data: { type: 'Residual Add' }},
                    { name: `RMSNorm2_${idx}`, pos: [-15, -7, 0], size: [5, 3, 3], color: colors.norm, 
                      data: { eps: '1e-6', desc: 'Pre-FFN normalization' }},
                    { name: `Gate_${idx}`, pos: [-8, -7, 0], size: [5, 3, 3], color: colors.ffn, 
                      data: { activation: 'SiLU/Swish', desc: 'Gating activation' }},
                    { name: `Up_${idx}`, pos: [-2, -7, 0], size: [6, 4, 3], color: colors.ffn,
                      data: { 
                          weight: `[I, H]`,
                          shape: `[${cfg.hiddenSize}, ${cfg.intermediateSize}]`,
                          params: formatParams(cfg.hiddenSize * cfg.intermediateSize),
                          intermediate: cfg.intermediateSize,
                          desc: 'FFN up projection' }},
                    { name: `Down_${idx}`, pos: [5, -7, 0], size: [6, 4, 3], color: colors.ffn,
                      data: { 
                          weight: `[H, I]`,
                          shape: `[${cfg.intermediateSize}, ${cfg.hiddenSize}]`,
                          params: formatParams(cfg.intermediateSize * cfg.hiddenSize),
                          desc: 'FFN down projection' }},
                    { name: `Add2_${idx}`, pos: [12, -7, 0], size: [4, 3, 3], color: colors.ffn, 
                      data: { type: 'Residual Add' }}
                ],
                connections: [
                    { from: `RMSNorm1_${idx}`, to: `QKV_${idx}`, label: 'x' },
                    { from: `QKV_${idx}`, to: `Attn_${idx}`, label: 'qkv' },
                    { from: `Attn_${idx}`, to: `Proj_${idx}`, label: 'attn' },
                    { from: `Proj_${idx}`, to: `Add1_${idx}`, label: 'proj' },
                    { from: `RMSNorm2_${idx}`, to: `Gate_${idx}`, label: 'x' },
                    { from: `RMSNorm2_${idx}`, to: `Up_${idx}`, label: 'x' },
                    { from: `Gate_${idx}`, to: `Down_${idx}`, label: 'g' },
                    { from: `Up_${idx}`, to: `Down_${idx}`, label: 'h' },
                    { from: `Down_${idx}`, to: `Add2_${idx}`, label: 'out' }
                ]
            };
        }

        function buildMoELayer(idx, y, cfg) {
            const modules = [
                // Attention Block (Same as Dense)
                { name: `RMSNorm1_${idx}`, pos: [-15, 9, 0], size: [5, 3, 3], color: colors.norm, 
                  data: { eps: '1e-6', desc: 'Pre-attention normalization' }},
                { name: `QKV_${idx}`, pos: [-8, 9, 0], size: [6, 4, 3], color: colors.attention,
                  data: { 
                      weight: `[3H, H]`,
                      shape: `[${3 * cfg.hiddenSize}, ${cfg.hiddenSize}]`,
                      params: formatParams(cfg.hiddenSize * 3 * cfg.hiddenSize),
                      heads: `${cfg.numHeads}Q + ${cfg.numKvHeads}K/V`,
                      head_dim: cfg.headDim,
                      desc: 'Query/Key/Value projection' }},
                { name: `Attn_${idx}`, pos: [0, 9, 0], size: [8, 4, 4], color: colors.attention,
                  data: { 
                      type: 'GQA',
                      heads: cfg.numHeads,
                      kv_heads: cfg.numKvHeads,
                      desc: 'Grouped Query Attention' }},
                { name: `Proj_${idx}`, pos: [8, 9, 0], size: [6, 4, 3], color: colors.attention,
                  data: { 
                      weight: `[H, H]`,
                      shape: `[${cfg.hiddenSize}, ${cfg.hiddenSize}]`,
                      params: formatParams(cfg.hiddenSize * cfg.hiddenSize),
                      desc: 'Output projection' }},
                { name: `Add1_${idx}`, pos: [15, 9, 0], size: [4, 3, 3], color: colors.ffn, 
                  data: { type: 'Residual Add' }},
                  
                // MoE FFN Block
                { name: `RMSNorm2_${idx}`, pos: [-18, 0, 0], size: [5, 3, 3], color: colors.norm, 
                  data: { eps: '1e-6', desc: 'Pre-FFN normalization' }},
                { name: `Router_${idx}`, pos: [-10, 0, 0], size: [7, 4, 4], color: colors.router,
                  data: { 
                      weight: `[H, E]`,
                      shape: `[${cfg.hiddenSize}, ${cfg.numExperts}]`,
                      params: formatParams(cfg.hiddenSize * cfg.numExperts),
                      top_k: cfg.expertsPerTok,
                      temperature: 1.0,
                      desc: 'Expert router (Top-K)' }},
                { name: `SharedExpert_${idx}`, pos: [0, 0, 0], size: [8, 4, 4], color: colors.shared,
                  data: { 
                      params: formatParams(cfg.hiddenSize * cfg.expertSize * 3),
                      desc: 'Always-active shared expert' }}
            ];

            const connections = [
                // Attention connections
                { from: `RMSNorm1_${idx}`, to: `QKV_${idx}`, label: 'x' },
                { from: `QKV_${idx}`, to: `Attn_${idx}`, label: 'qkv' },
                { from: `Attn_${idx}`, to: `Proj_${idx}`, label: 'attn' },
                { from: `Proj_${idx}`, to: `Add1_${idx}`, label: 'proj' },
                
                // MoE connections
                { from: `RMSNorm2_${idx}`, to: `Router_${idx}`, label: 'x' },
                { from: `RMSNorm2_${idx}`, to: `SharedExpert_${idx}`, label: 'x' }
            ];

            // Experts grid (adaptive)
            const displayExperts = Math.min(cfg.numExperts, 16);
            const numCols = Math.min(displayExperts, Math.ceil(Math.sqrt(displayExperts)));
            const numRows = Math.ceil(displayExperts / numCols);
            const spacing = 7; // Increased spacing between experts
            const startX = -((numCols - 1) * spacing) / 2;
            const expertY = -5; // Move experts down a bit

            for (let e = 0; e < displayExperts; e++) {
                const row = Math.floor(e / numCols);
                const col = e % numCols;
                const x = startX + col * spacing;
                const z = (row - (numRows - 1) / 2) * spacing;
                const isActive = e < cfg.expertsPerTok;

                modules.push({
                    name: `Expert${e}_${idx}`, pos: [x, expertY, z], size: [4, 3, 4],
                    color: isActive ? colors.expert_active : colors.expert,
                    data: { 
                        id: e, 
                        active: isActive,
                        weight: `[H, E]`,
                        shape: `[${cfg.hiddenSize}, ${cfg.expertSize}]`,
                        params: formatParams(cfg.hiddenSize * cfg.expertSize * 3),
                        desc: isActive ? '★ ACTIVE Expert' : 'Inactive Expert'
                    }
                });

                connections.push({
                    from: `Router_${idx}`, to: `Expert${e}_${idx}`,
                    label: isActive ? '★' : '',
                    active: isActive
                });
            }
            
            if (cfg.numExperts > 16) {
                modules.push({
                    name: `... (+${cfg.numExperts - 16} Experts)`, pos: [0, expertY, ((numRows - 1) / 2 + 1) * spacing], size: [8, 2, 4],
                    color: colors.expert,
                    data: { desc: `Hidden experts for visualization performance` }
                });
            }

            modules.push({
                name: `Aggregate_${idx}`, pos: [20, 0, 0], size: [6, 4, 4], color: colors.moe,
                data: { 
                    top_k: cfg.expertsPerTok,
                    num_experts: cfg.numExperts,
                    desc: 'Weighted expert aggregation' }
            });

            for (let e = 0; e < displayExperts; e++) {
                connections.push({ from: `Expert${e}_${idx}`, to: `Aggregate_${idx}`, label: `e${e}` });
            }
            if (cfg.numExperts > 16) {
                connections.push({ from: `... (+${cfg.numExperts - 16} Experts)`, to: `Aggregate_${idx}`, label: 'rest' });
            }
            connections.push({ from: `SharedExpert_${idx}`, to: `Aggregate_${idx}`, label: 'shared' });
            connections.push({ from: `Aggregate_${idx}`, to: `Add2_${idx}`, label: 'ffn_out' });
            
            // Add2 missing in MoE
            modules.push({ name: `Add2_${idx}`, pos: [28, 0, 0], size: [4, 3, 3], color: colors.ffn, data: { type: 'Residual Add' }});

            return {
                name: `MOE_L${idx}`, y, type: 'moe',
                modules,
                connections
            };
        }

        function buildLinearAttentionLayer(idx, y, cfg) {
            return {
                name: `LINEAR_ATTN_L${idx}`, y, type: 'linear_attn',
                modules: [
                    { name: `RMSNorm1_${idx}`, pos: [-12, 6, 0], size: [5, 3, 3], color: colors.norm, 
                      data: { eps: '1e-6', desc: 'Pre-attention normalization' }},
                    { name: `QLinear_${idx}`, pos: [-4, 6, -5], size: [7, 4, 4], color: colors.linear_attn,

                    { name: `Gated_${idx}`, pos: [0, -7, 0], size: [8, 4, 4], color: colors.ffn,

                    { name: `Add2_${idx}`, pos: [12, -7, 0], size: [4, 3, 3], color: colors.ffn,

                ],
                connections: [
                    { from: `RMSNorm1_${idx}`, to: `QLinear_${idx}`, label: 'x' },
                    { from: `RMSNorm1_${idx}`, to: `KLinear_${idx}`, label: 'x' },
                    { from: `RMSNorm1_${idx}`, to: `VLinear_${idx}`, label: 'x' },
                    { from: `QLinear_${idx}`, to: `OutProj_${idx}`, label: 'q' },
                    { from: `KLinear_${idx}`, to: `OutProj_${idx}`, label: 'k' },
                    { from: `VLinear_${idx}`, to: `OutProj_${idx}`, label: 'v' },
                    { from: `OutProj_${idx}`, to: `Add1_${idx}`, label: 'out' },
                    
                    { from: `RMSNorm2_${idx}`, to: `Gated_${idx}`, label: 'x' },
                    { from: `Gated_${idx}`, to: `Add2_${idx}`, label: 'ffn_out' }
                ]
            };
        }

        function buildNavTree(layers) {
            const nav = document.getElementById('navTree');
            nav.innerHTML = '';
            
            layers.forEach((layer, idx) => {
                const isCollapsed = collapsedLayers.has(layer.name);
                const item = document.createElement('div');
                item.className = 'nav-item';
                
                let layerColor = colors[layer.type] !== undefined ? colors[layer.type] : 0x888888;
                let colorHex = layerColor.toString(16).padStart(6, '0');
                
                item.innerHTML = `
                    <span class="text-gray-400 cursor-pointer" onclick="toggleLayer('${layer.name}')">${isCollapsed ? '▶' : '▼'}</span>
                    <div class="type-indicator" style="background:#${colorHex}"></div>
                    <span class="text-white flex-1">${layer.name}</span>
                    <span class="text-gray-500 text-xs">${layer.modules ? layer.modules.length : 0}</span>
                `;
                item.onclick = (e) => {
                    if (e.target.tagName !== 'SPAN' || !e.target.textContent.includes('▶') && !e.target.textContent.includes('▼')) {
                        // Find the corresponding layerGroup
                        const lg = layerGroups.find(g => g.name === layer.name);
                        if (lg) {
                            selectLayer(lg);
                        }
                    }
                };
                nav.appendChild(item);
                
                if (!isCollapsed && layer.modules) {
                    layer.modules.forEach(m => {
                        const subItem = document.createElement('div');
                        subItem.className = 'nav-item pl-8 text-xs';
                        
                        let mColor = m.color !== undefined ? m.color : 0x888888;
                        let mColorHex = mColor.toString(16).padStart(6, '0');
                        
                        subItem.innerHTML = `
                            <div class="type-indicator" style="background:#${mColorHex}"></div>
                            <span class="text-gray-300 flex-1">${m.name}</span>
                            ${m.data?.params ? `<span class="text-gray-500">${m.data.params}</span>` : ''}
                        `;
                        subItem.onclick = (e) => {
                            e.stopPropagation();
                            
                            // Find the corresponding layerGroup and module
                            const lg = layerGroups.find(g => g.name === layer.name);
                            if (lg) {
                                const mod = lg.modules.find(mod => mod.name === m.name);
                                if (mod) {
                                    selectModule(lg, mod);
                                }
                            }
                        };
                        nav.appendChild(subItem);
                    });
                }
            });
        }

        function selectLayer(layer) {
            // Focus camera on layer
            if (layer.group) {
                const targetPos = new THREE.Vector3();
                layer.group.getWorldPosition(targetPos);
                
                gsapTo(camera.position, { 
                    x: targetPos.x + 60, 
                    y: targetPos.y + 30, 
                    z: targetPos.z + 80 
                }, 1.0);
                gsapTo(controls.target, { 
                    x: targetPos.x, 
                    y: targetPos.y, 
                    z: targetPos.z 
                }, 1.0);
            }
            
            // Update detail panel
            document.getElementById('detailPanel').style.display = 'flex';
            document.getElementById('detailType').textContent = 'Layer';
            document.getElementById('detailTitle').textContent = layer.name;
            document.getElementById('detailContent').innerHTML = `
                <div class="space-y-3">
                    <div class="stat-card">
                        <div class="stat-label">Type</div>
                        <div class="stat-value text-base">${(layer.type || 'unknown').toUpperCase()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Modules</div>
                        <div class="stat-value text-base">${layer.modules ? layer.modules.length : 0}</div>
                    </div>
                    ${layer.connections ? `

                    </div>
                    ` : ''}

            `;
        }

        function selectModule(layer, mod) {
            // Highlight module
            if (highlightedObject) {
                if (highlightedObject.material && highlightedObject.userData && highlightedObject.userData.originalOpacity !== undefined) {
                    highlightedObject.material.opacity = highlightedObject.userData.originalOpacity;
                    highlightedObject.material.emissiveIntensity = 0;
                }
            }
            if (mod.mesh && mod.mesh.material) {
                highlightedObject = mod.mesh;
                mod.mesh.material.opacity = 1;
                mod.mesh.material.emissive = mod.mesh.material.color;
                mod.mesh.material.emissiveIntensity = 0.5;
                
                // Focus camera on module
                const targetPos = new THREE.Vector3();
                mod.mesh.getWorldPosition(targetPos);
                
                gsapTo(camera.position, { 
                    x: targetPos.x + 30, 
                    y: targetPos.y + 20, 
                    z: targetPos.z + 40 
                }, 1.0);
                gsapTo(controls.target, { 
                    x: targetPos.x, 
                    y: targetPos.y, 
                    z: targetPos.z 
                }, 1.0);
            }
            
            // Update detail panel
            document.getElementById('detailPanel').style.display = 'flex';
            document.getElementById('detailType').textContent = 'Module';
            document.getElementById('detailTitle').textContent = mod.name;
            
            const data = mod.data || {};
            let content = '<div class="space-y-3">';
            
            if (data.desc) {
                content += `<div class="text-sm text-gray-300">${data.desc}</div>`;
            }
            
            content += '<div class="grid grid-cols-2 gap-2 text-xs">';
            if (data.shape) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Shape</div><div class="text-blue-400 font-mono">${data.shape}</div></div>`;
            }
            if (data.params) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Params</div><div class="text-blue-400 font-mono">${data.params}</div></div>`;
            }
            if (data.dtype) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Dtype</div><div class="text-purple-400 font-mono">${data.dtype}</div></div>`;
            }
            if (data.heads) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Heads</div><div class="text-cyan-400 font-mono">${data.heads}</div></div>`;
            }
            if (data.head_dim) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Head Dim</div><div class="text-cyan-400 font-mono">${data.head_dim}</div></div>`;
            }
            if (data.activation) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Activation</div><div class="text-green-400 font-mono">${data.activation}</div></div>`;
            }
            if (data.eps) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Epsilon</div><div class="text-gray-400 font-mono">${data.eps}</div></div>`;
            }
            if (data.top_k !== undefined) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Top-K</div><div class="text-amber-400 font-mono">${data.top_k}</div></div>`;
            }
            if (data.intermediate) {
                content += `<div class="bg-black/30 rounded p-2"><div class="text-gray-500">Intermediate</div><div class="text-orange-400 font-mono">${data.intermediate}</div></div>`;
            }
            content += '</div></div>';
            
            document.getElementById('detailContent').innerHTML = content;
        }

        function toggleLayer(name) {
            if (collapsedLayers.has(name)) {
                collapsedLayers.delete(name);
            } else {
                collapsedLayers.add(name);
            }
            buildNavTree(modelLayers);
        }

        function expandAll() {
            collapsedLayers.clear();
            buildNavTree(modelLayers);
        }

        function collapseAll() {
            layerGroups.forEach(lg => collapsedLayers.add(lg.name));
            buildNavTree(modelLayers);
        }

        function closeDetail() {
            document.getElementById('detailPanel').style.display = 'none';
