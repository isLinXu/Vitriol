            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        // Context menu actions
        function focusOnSelected() {
            if (selectedObject) {
                const targetPos = new THREE.Vector3();
                selectedObject.getWorldPosition(targetPos);
                
                gsapTo(camera.position, { 
                    x: targetPos.x + 30, 
                    y: targetPos.y + 20, 
                    z: targetPos.z + 40 
                }, 1.0);
                gsapTo(controls.target, { 
                    x: targetPos.x, 
                    y: targetPos.y, 
                    z: targetPos.z 
                }, 1.0);
            }
            hideContextMenu();
        }

        function expandModule() {
            if (selectedObject) {
                // Expand/highlight the selected module
            }
            hideContextMenu();
        }

        function hideModule() {
            if (selectedObject) {
                selectedObject.visible = false;
            }
            hideContextMenu();
        }

        function showAllModules() {
            nodes.forEach(n => n.visible = true);
            hideContextMenu();
        }

        function copyModuleConfig() {
            if (selectedObject && selectedObject.userData.data) {
                navigator.clipboard.writeText(JSON.stringify(selectedObject.userData.data, null, 2));
            }
            hideContextMenu();
        }

        function copyConfig() {
            if (modelConfig) {
                navigator.clipboard.writeText(JSON.stringify(modelConfig.raw, null, 2));
            }
        }

        function exportModulePNG() {
            exportAsPNG('module-diagram');
            hideContextMenu();
        }

        // ============================================
        // Comparison Mode
        // ============================================
        function toggleCompare() {
            const overlay = document.getElementById('comparisonOverlay');
            const panel = document.getElementById('comparisonPanel');
            const btn = document.getElementById('compareBtn');
            
            if (panel.classList.contains('show')) {
                panel.classList.remove('show');
                overlay.classList.remove('show');
                btn.classList.remove('active');
            } else {
                panel.classList.add('show');
                overlay.classList.add('show');
                btn.classList.add('active');
                loadComparison();
            }
        }

        function closeComparison() {
            document.getElementById('comparisonPanel').classList.remove('show');
            document.getElementById('comparisonOverlay').classList.remove('show');
            document.getElementById('compareBtn').classList.remove('active');
        }

        function loadComparison() {
            const content = document.getElementById('comparisonContent');
            
            // Get all available models
            const models = [
                'Qwen3.5-397B-A17B',
                'DeepSeek-R1',
                'GLM-4.7',
                'Mistral-7B',
                'MiniMax-M2.5'
            ];
            
            // Build comparison table
            let html = '<table class="w-full text-xs">';
            html += '<thead><tr class="text-left text-gray-400 border-b border-white/10">';
            html += '<th class="p-2">Property</th>';
            models.forEach(m => {
                html += `<th class="p-2">${m}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            const properties = [
                { key: 'totalParams', label: 'Total Params', format: formatParams },
                { key: 'numLayers', label: 'Layers' },
                { key: 'hiddenSize', label: 'Hidden Size' },
                { key: 'numHeads', label: 'Attention Heads' },
                { key: 'numExperts', label: 'Experts', default: '-' },
                { key: 'isMoE', label: 'Type', format: v => v ? 'MoE' : 'Dense' }
            ];
            
            properties.forEach(prop => {
                html += `<tr class="border-b border-white/5">`;
                html += `<td class="p-2 text-gray-400">${prop.label}</td>`;
                models.forEach(m => {
                    const val = prop.format ? prop.format(prop.default !== undefined ? prop.default : 0) : '-';
                    html += `<td class="p-2 text-white">${val}</td>`;
                });
                html += `</tr>`;
            });
            
            html += '</tbody></table>';
            content.innerHTML = html;
        }

        function addModelToCompare() {
            // Would open a dialog to add another model
            alert('Add model dialog - select a model path to compare');
        }

        // ============================================
        // Export Functions
        // ============================================
        function exportFullPNG() {
            // Render at high resolution
            const originalPixelRatio = renderer.getPixelRatio();
            renderer.setPixelRatio(2);
            renderer.setSize(window.innerWidth * 2, window.innerHeight * 2);
            
            renderer.render(scene, camera);
            
            const dataURL = renderer.domElement.toDataURL('image/png');
            
            // Restore
            renderer.setPixelRatio(originalPixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Download
            const link = document.createElement('a');
            link.download = `vitriol-model-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        }

        function exportDetailPNG() {
            // Export detail panel as image
            alert('Export detail panel feature');
        }

        // ============================================
        // Camera & Layout Controls
        // ============================================
        function resetCamera() {
            let minY = 0, maxY = 50;
            if (modelLayers && modelLayers.length > 0) {
                maxY = modelLayers[0].y;
                minY = modelLayers[modelLayers.length - 1].y;
            }
            const totalHeight = Math.abs(minY - maxY) || 100;
            const centerY = (minY + maxY) / 2;
            
            gsapTo(camera.position, { x: totalHeight * 0.8, y: centerY, z: totalHeight }, 1.0);
            gsapTo(controls.target, { x: 0, y: centerY, z: 0 }, 1.0);
        }

        function setPresetView(viewType) {
            let minY = 0, maxY = 50;
            if (modelLayers && modelLayers.length > 0) {
                maxY = modelLayers[0].y;
                minY = modelLayers[modelLayers.length - 1].y;
            }
            const totalHeight = Math.abs(minY - maxY) || 100;
            const centerY = (minY + maxY) / 2;

            switch(viewType) {
                case 'top':
                    gsapTo(camera.position, { x: 0, y: maxY + totalHeight * 0.8, z: 0 }, 1.0);
                    break;
                case 'front':
                    gsapTo(camera.position, { x: 0, y: centerY, z: totalHeight * 1.2 }, 1.0);
                    break;
                case 'side':
                    gsapTo(camera.position, { x: totalHeight * 1.2, y: centerY, z: 0 }, 1.0);
                    break;
            }
            gsapTo(controls.target, { x: 0, y: centerY, z: 0 }, 1.0);
        }

        function toggleLayout() {
            is3D = !is3D;
            const btn = document.getElementById('layoutBtn');
            
            // Get model bounds
            let minY = 0;
            let maxY = 50;
            if (modelLayers && modelLayers.length > 0) {
                maxY = modelLayers[0].y;
                minY = modelLayers[modelLayers.length - 1].y;
            }
            const totalHeight = Math.abs(minY - maxY) || 100;
            const centerY = (minY + maxY) / 2;
            
            if (is3D) {
                camera.position.set(totalHeight * 0.8, centerY, totalHeight);
                btn.textContent = '📐 3D';
                btn.classList.add('active');
            } else {
                camera.position.set(0, centerY, totalHeight * 1.2);
                btn.textContent = '📱 2D';
                btn.classList.remove('active');
            }
            controls.target.set(0, centerY, 0);
            controls.update();
        }

        function toggleFlow() {
            showFlow = !showFlow;
            const btn = document.getElementById('flowBtn');
            flowParticles.forEach(p => p.visible = showFlow);
            pipeMeshes.forEach(p => {
                if (p.material.emissiveIntensity > 0) {
                    p.material.opacity = showFlow ? 0.7 : 0.2;
                }
            });
            btn.classList.toggle('active', showFlow);
        }

        function toggleLabels() {
            showLabels = !showLabels;
            const btn = document.getElementById('labelsBtn');
            scene.traverse(obj => {
                if (obj.isCSS2DObject) {
                    obj.visible = showLabels;
                }
            });
            btn.classList.toggle('active', showLabels);
        }

        // ============================================
        // Interaction
        // ============================================
        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            
            // Update cursor
            document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
            
            // Show tooltip
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                const data = obj.userData.data || {};
                let content = '<div class="tooltip-row"><span class="tooltip-label">Module</span><span class="tooltip-value">' + obj.userData.name + '</span></div>';
                if (data.desc) content += '<div class="tooltip-row"><span class="tooltip-label">Desc</span><span class="tooltip-value">' + data.desc + '</span></div>';
                if (data.params) content += '<div class="tooltip-row"><span class="tooltip-label">Params</span><span class="tooltip-value">' + data.params + '</span></div>';
                if (data.shape) content += '<div class="tooltip-row"><span class="tooltip-label">Shape</span><span class="tooltip-value">' + data.shape + '</span></div>';
                showTooltip(e, obj.userData.name, content);
            } else {
                hideTooltip();
            }
        }

        function onClick(e) {
            if (e.button !== 0) return; // Left click only
            
            // Check if click is on a UI element (don't raycast if so)
            if (e.target.closest('.glass-panel') || e.target.closest('.control-btn') || e.target.closest('.nav-item')) {
                return;
            }
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            
            if (intersects.length > 0) {
                selectedObject = intersects[0].object;
                // Select module
                const layer = layerGroups.find(lg => 
                    lg.modules.some(m => m.mesh === selectedObject)
                );
                if (layer) {
                    const mod = layer.modules.find(m => m.mesh === selectedObject);
                    if (mod) selectModule(layer, mod);
                }
            } else {
                // Clear selection if clicking on empty space
                if (highlightedObject && highlightedObject.material) {
                    if (highlightedObject.userData && highlightedObject.userData.originalOpacity !== undefined) {
                        highlightedObject.material.opacity = highlightedObject.userData.originalOpacity;
                        highlightedObject.material.emissiveIntensity = 0;
                    }
                    highlightedObject = null;
                }
                document.getElementById('detailPanel').style.display = 'none';
            }
        }

        function onRightClick(e) {
            e.preventDefault();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            
            if (intersects.length > 0) {
                selectedObject = intersects[0].object;
                showContextMenu(e);
            }
        }

        // ============================================
        // Keyboard Shortcuts
        // ============================================
        function onKeyDown(e) {
            switch(e.key.toLowerCase()) {
                case 'r':
                    resetCamera();
                    break;
                case 'f':
                    if (selectedObject) focusOnSelected();
                    break;
                case 'h':
                    toggleLabels();
                    break;
                case 'escape':
                    closeComparison();
                    hideContextMenu();
                    break;
                case 'c':
                    if (e.ctrlKey || e.metaKey) {
                        copyConfig();
                    }
                    break;
            }
        }

        // ============================================
        // LOD (Level of Detail) & Virtualization
        // ============================================
        function updateLOD() {
            if (!camera || !controls) return;
            const dist = camera.position.distanceTo(controls.target);
            
            // Adjust visibility based on distance to improve performance
            scene.traverse(obj => {
                if (obj.isCSS2DObject && showLabels) {
                    if (obj.element.classList.contains('params-label') || obj.element.classList.contains('data-label')) {
                        obj.visible = dist < 250;
                    } else if (obj.element.classList.contains('module-name')) {
                        obj.visible = dist < 450;
                    }
                }
                if (obj.userData && obj.userData.isEdge) {
                    obj.visible = dist < 350;
                }
            });
        }

        // ============================================
        // Export Functions
        // ============================================
        function exportPNGViz() {
            renderer.render(scene, camera);
            const dataURL = renderer.domElement.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = (modelConfig?.name || 'model') + '_architecture.png';
            link.href = dataURL;
            link.click();
        }

        function exportHTMLViz() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = (modelConfig?.name || 'model') + '_standalone.html';
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
        }

        // ============================================
        // Animation Loop
        // ============================================
        function animate() {
            requestAnimationFrame(animate);
            if (stats) stats.begin();
            controls.update();
            updateFlowParticles();
            updateLOD();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            if (stats) stats.end();
        }

        // ============================================
        // Simple animation helper
        // ============================================
        function gsapTo(obj, props, duration = 0.5) {
            const start = {};
            const change = {};
            for (let key in props) {
                start[key] = obj[key];
                change[key] = props[key] - start[key];
            }
            const startTime = Date.now();
            
            function update() {
                const elapsed = (Date.now() - startTime) / 1000;
                const t = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
                
                for (let key in props) {
                    obj[key] = start[key] + change[key] * ease;
                }
                
                // If animating camera or target, need to call update
                if (obj === camera.position) {
                    camera.lookAt(controls.target);
                }
                
                if (t < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        // ============================================
        // Initialization
        // ============================================
        async function init() {
            try {
                // Get model path from URL hash parameters
                // Supported formats:
                //   viewer.html#?model=data/qwen3-demo              (local relative path)
                //   viewer.html#?hf=isLinXu/Qwen3.5-397B-A17B-Vitriol-ultra-dummy  (HuggingFace repo)
                //   viewer.html#?hf=Qwen/Qwen3.5-397B-A17B         (any HF model with config.json)
                const defaultModelPath = 'data/qwen3-demo';
                let modelPath = '';
                let hfRepo = '';
                if (window.location.hash) {
                    const urlParams = new URLSearchParams(window.location.hash.split('?')[1]);
                    modelPath = urlParams.get('model') || '';
                    hfRepo = urlParams.get('hf') || '';
                }
                
                // HuggingFace remote loading takes priority
                if (hfRepo) {
                    modelPath = `hf://${hfRepo}`;
                }
                
                if (!modelPath) {
                    modelPath = localStorage.getItem('vitriol_model_path') || defaultModelPath;
                }
                
                document.getElementById('modelPath').textContent = modelPath;
                
                initScene();
                
                const cfg = await loadModelConfig(modelPath);
                document.getElementById('modelName').textContent = cfg.name;
                document.getElementById('loadingText').textContent = `Building ${cfg.name}...`;
                
                // Use a slight delay to allow the UI to update the loading text before heavy building
                setTimeout(() => {
                    try {
                        buildModel(cfg);
                        
                        // Event listeners
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            });
                        
                        document.addEventListener('mousemove', onMouseMove);
                        document.addEventListener('click', onClick);
                        document.addEventListener('contextmenu', onRightClick);
                        document.addEventListener('keydown', onKeyDown);
                        document.addEventListener('click', () => hideContextMenu());
                        
                        // Search
                        document.getElementById('searchInput').addEventListener('input', (e) => {
                            const query = e.target.value.toLowerCase();
                            if (!query) {
                                nodes.forEach(n => n.visible = true);
                                return;
                            }
                            nodes.forEach(n => {
                                const name = n.userData.name?.toLowerCase() || '';
                                const desc = n.userData.data?.desc?.toLowerCase() || '';
                                n.visible = name.includes(query) || desc.includes(query);
                            });
                        });
                        
                        // Hide loading
                        document.getElementById('loading').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loading').style.display = 'none';
                        }, 500);
                        
                        animate();
                    } catch (e) {
                        console.error(e);
                        document.getElementById('loadingText').textContent = `Error building model: ${e.message}`;
                        document.getElementById('loadingText').style.color = '#ef4444';
                        document.querySelector('.loader').style.display = 'none';
                    }
                }, 50);
            } catch (e) {
                console.error(e);
                document.getElementById('loadingText').textContent = `Error loading config: ${e.message}`;
                document.getElementById('loadingText').style.color = '#ef4444';
                document.querySelector('.loader').style.display = 'none';
            }
        }

        // Utility functions
        function formatParams(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }

        init();
    </script>
