name: Vitriol Structure Check
description: Run vitriol check (analyze → viz → generate → validate) and assert success
branding:
  icon: search
  color: purple

inputs:
  model_id:
    description: HuggingFace model ID or local path to a config directory
    required: true
  output_dir:
    description: Directory for the check report bundle
    required: false
    default: vitriol-report
  strategy:
    description: Weight generation strategy for the validate step
    required: false
    default: compact
  fast:
    description: Skip inference validation and weight distribution hashing
    required: false
    default: "true"
  trust_remote_code:
    description: Allow executing remote model code when loading configs
    required: false
    default: "false"
  offline:
    description: Disable network access (alias for --offline on vitriol CLI)
    required: false
    default: "true"
  vitriol_ref:
    description: Git ref for pip install (e.g. v0.3.1 or main). Uses this repository by default.
    required: false
    default: ""
  python_version:
    description: Python version for the runner setup
    required: false
    default: "3.11"

outputs:
  report_dir:
    description: Path to the generated report directory
    value: ${{ inputs.output_dir }}
  success:
    description: Whether vitriol check succeeded
    value: ${{ steps.assert.outputs.success }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install Vitriol
      shell: bash
      run: |
        python -m pip install --upgrade pip
        REF="${{ inputs.vitriol_ref }}"
        if [ -n "$REF" ]; then
          pip install "git+https://github.com/isLinXu/Vitriol.git@${REF}[viz]"
        elif [ -f pyproject.toml ] && grep -q 'name = "vitriol"' pyproject.toml; then
          pip install -e ".[viz]"
        else
          pip install "git+https://github.com/isLinXu/Vitriol.git@main[viz]"
        fi

    - name: Run vitriol check
      shell: bash
      run: |
        ARGS=(check "${{ inputs.model_id }}" -o "${{ inputs.output_dir }}" --strategy "${{ inputs.strategy }}")
        if [ "${{ inputs.fast }}" = "true" ]; then
          ARGS+=(--fast)
        fi
        if [ "${{ inputs.offline }}" = "true" ]; then
          ARGS=(--offline "${ARGS[@]}")
        fi
        if [ "${{ inputs.trust_remote_code }}" = "true" ]; then
          ARGS=(--trust-remote-code "${ARGS[@]}")
        else
          ARGS=(--no-trust-remote-code "${ARGS[@]}")
        fi
        vitriol "${ARGS[@]}"

    - name: Assert report success
      id: assert
      shell: bash
      run: |
        python - <<'PY'
        import json, os, sys
        from pathlib import Path
        report = Path(os.environ["REPORT_DIR"]) / "check-report.json"
        if not report.exists():
            sys.exit(f"missing {report}")
        payload = json.loads(report.read_text(encoding="utf-8"))
        if not payload.get("success"):
            sys.exit(f"vitriol check failed: {payload}")
        print("success=true")
        PY
        echo "success=true" >> "$GITHUB_OUTPUT"
      env:
        REPORT_DIR: ${{ inputs.output_dir }}
