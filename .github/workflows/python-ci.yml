name: Python CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,viz]"
          
      - name: Lint governance layer with ruff
        run: |
          ruff check \
            src/vitriol/api/server.py \
            src/vitriol/cli/main.py \
            src/vitriol/config \
            src/vitriol/security \
            src/vitriol/utils/hf_loading.py \
            tests/test_api_server.py \
            --output-format=github
        
      - name: Type check governance layer with mypy
        run: |
          mypy \
            src/vitriol/api/server.py \
            src/vitriol/cli/main.py \
            src/vitriol/security/context.py \
            --ignore-missing-imports \
            --follow-imports=skip

      - name: Advisory full lint
        run: |
          ruff check src/ tests/ --output-format=github
        continue-on-error: true

      - name: Advisory focused legacy type check
        run: |
          mypy src/vitriol/core/generator.py src/vitriol/core/validator.py --ignore-missing-imports
        continue-on-error: true
        
      - name: Run tests
        run: |
          pytest tests/ -v --ignore=tests/integration --tb=short --maxfail=5
        env:
          PYTHONPATH: src
          
      - name: Test CLI commands
        run: |
          python -m vitriol --version
          python -m vitriol --help
          python -m vitriol generate --help
        env:
          PYTHONPATH: src

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build
          
      - name: Build distribution
        run: |
          python -m build --no-isolation
          
      - name: Check distribution
        run: |
          ls -lh dist/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
