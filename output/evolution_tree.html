
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitriol Architecture Evolution Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }

        #tree-container {
            width: 100%;
            height: calc(100vh - 100px);
            overflow: hidden;
        }

        .node {
            cursor: pointer;
        }

        .node circle {
            stroke: #fff;
            stroke-width: 2px;
            transition: all 0.3s ease;
        }

        .node:hover circle {
            stroke-width: 4px;
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
        }

        .node text {
            font-size: 11px;
            fill: #e0e0e0;
            text-anchor: middle;
            pointer-events: none;
        }

        .link {
            fill: none;
            stroke: #4a5568;
            stroke-width: 2px;
            stroke-opacity: 0.6;
        }

        .link:hover {
            stroke: #00d4ff;
            stroke-opacity: 1;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            max-width: 350px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #00d4ff;
        }

        .tooltip .family {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }

        .tooltip .params {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tooltip .param {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .tooltip .param span {
            color: #888;
            font-size: 10px;
        }

        .tooltip .param strong {
            color: #fff;
            font-size: 12px;
        }

        .tooltip .innovations {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            margin-top: 10px;
        }

        .tooltip .innovation {
            display: inline-block;
            background: linear-gradient(90deg, #7c3aed, #00d4ff);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin: 2px;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            font-size: 11px;
        }

        .legend h4 {
            margin-bottom: 10px;
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .controls {
            position: fixed;
            top: 80px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .stats {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
        }

        .stats h4 {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Architecture Evolution Tree</h1>
        <p>LLM Model Family Relationships and Innovations</p>
    </div>

    <div class="stats">
        <h4>Statistics</h4>
        <div class="stat-item">
            <span class="stat-label">Total Models</span>
            <span class="stat-value">1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Families</span>
            <span class="stat-value">1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Innovations</span>
            <span class="stat-value">0</span>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="zoomIn()">Zoom In</button>
        <button class="control-btn" onclick="zoomOut()">Zoom Out</button>
        <button class="control-btn" onclick="resetZoom()">Reset</button>
        <button class="control-btn" onclick="toggleLabels()">Toggle Labels</button>
    </div>

    <div id="tree-container"></div>

    <div class="tooltip" id="tooltip">
        <h3 id="tooltip-title"></h3>
        <div class="family" id="tooltip-family"></div>
        <div class="params" id="tooltip-params"></div>
        <div class="innovations" id="tooltip-innovations"></div>
    </div>

    <script>
        // Tree data
        const treeData = [{"id": "demo/model", "name": "model", "shortName": "model", "family": "demo", "params": {"hidden_size": null, "num_hidden_layers": null, "num_attention_heads": null, "num_key_value_heads": null, "intermediate_size": null, "vocab_size": null, "max_position_embeddings": null, "model_type": "fake", "rope_type": "default", "is_moe": false, "num_experts": 1}, "innovations": []}];

        // Family colors
        const familyColors = {"Qwen": "#06b6d4", "LLaMA": "#f59e0b", "DeepSeek": "#ef4444", "Mistral": "#8b5cf6", "GLM": "#10b981", "Kimi": "#ec4899", "GPT": "#6366f1", "Yi": "#f97316", "Phi": "#14b8a6", "Gemma": "#8b5cf6", "Starcoder": "#3b82f6", "BLOOM": "#84cc16", "Falcon": "#f43f5e", "Other": "#7c3aed"};

        // Current zoom state
        let currentZoom = 1;
        let showLabels = true;

        // Create SVG
        const container = document.getElementById('tree-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select('#tree-container')
            .append('svg')
            .attr('width', '100%')
            .attr('height', '100%')
            .call(d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    currentZoom = event.transform.k;
                    g.attr('transform', event.transform);
                }))
            .append('g');

        const g = svg.append('g')
            .attr('transform', `translate(${width / 2}, 60)`);

        // Build hierarchy
        const rootNode = d3.stratify()
            .id(d => d.id)
            .parentId(d => d.parent)
            (treeData.nodes);

        const treeLayout = d3.tree()
            .size([width - 200, height - 150])
            .separation((a, b) => (a.parent === b.parent ? 1.5 : 2.5));

        const tree = treeLayout(rootNode);

        // Draw links
        g.selectAll('.link')
            .data(tree.links())
            .enter()
            .append('path')
            .attr('class', 'link')
            .attr('d', d3.linkVertical()
                .x(d => d.x - width / 2 + 100)
                .y(d => d.y + 60));

        // Draw nodes
        const nodes = g.selectAll('.node')
            .data(tree.descendants())
            .enter()
            .append('g')
            .attr('class', 'node')
            .attr('transform', d => `translate(${d.x - width / 2 + 100}, ${d.y + 60})`);

        nodes.append('circle')
            .attr('r', 8)
            .attr('fill', d => familyColors[d.data.family] || '#7c3aed')
            .on('mouseover', showTooltip)
            .on('mouseout', hideTooltip)
            .on('click', d => {
                window.open(`https://huggingface.co/${d.data.id}`, '_blank');
            });

        nodes.append('text')
            .attr('dy', 25)
            .text(d => d.data.shortName || d.data.name)
            .style('opacity', showLabels ? 1 : 0);

        // Tooltip functions
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            document.getElementById('tooltip-title').textContent = d.data.name;
            document.getElementById('tooltip-family').textContent = d.data.family + ' Family';

            // Params
            const params = d.data.params || {};
            const paramsHtml = Object.entries(params).slice(0, 6).map(([k, v]) => `
                <div class="param">
                    <span>${k}</span><br>
                    <strong>${v || 'N/A'}</strong>
                </div>
            `).join('');
            document.getElementById('tooltip-params').innerHTML = paramsHtml;

            // Innovations
            const innovations = d.data.innovations || [];
            const innHtml = innovations.map(i =>
                `<span class="innovation">${i.name}</span>`
            ).join('');
            document.getElementById('tooltip-innovations').innerHTML =
                innovations.length ? `<strong>Innovations:</strong><br>${innHtml}` : '';

            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // Control functions
        function zoomIn() {
            svg.transition().call(d3.zoom().scaleBy, 1.3);
        }

        function zoomOut() {
            svg.transition().call(d3.zoom().scaleBy, 0.7);
        }

        function resetZoom() {
            svg.transition().call(d3.zoom().transform, d3.zoomIdentity);
        }

        function toggleLabels() {
            showLabels = !showLabels;
            g.selectAll('.node text')
                .transition()
                .style('opacity', showLabels ? 1 : 0);
        }
    </script>
</body>
</html>
